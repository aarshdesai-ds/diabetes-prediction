name: Deploy to Hugging Face Spaces

# Runs after code lands on main. Pushes the repo to a Hugging Face Space that
# uses the Docker SDK (it builds the Dockerfile in this repo).
#
# One-time setup required in the GitHub repo settings:
#   Secrets:   HF_TOKEN     -> a Hugging Face write token (hf.co/settings/tokens)
#   Variables: HF_USERNAME  -> your Hugging Face username
#              HF_SPACE     -> the Space name, e.g. diabetes-prediction
# And create the Space once at hf.co/new-space (SDK: Docker).

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip gracefully if the HF token has not been configured yet.
    if: ${{ github.event_name == 'workflow_dispatch' || true }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard on missing config
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret not set; skipping deploy. See workflow header for setup."
            exit 0
          fi

      - name: Inject Hugging Face Space metadata into README
        if: ${{ env.HF_TOKEN != '' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cat > /tmp/header.md <<'EOF'
          ---
          title: Early Diabetes Risk Screening
          emoji: 🩺
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          app_port: 8501
          pinned: false
          license: mit
          ---

          EOF
          cat README.md >> /tmp/header.md
          mv /tmp/header.md README.md

      - name: Push to Hugging Face Space
        if: ${{ env.HF_TOKEN != '' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "ci: add HF Space metadata" || echo "nothing to commit"
          git push --force "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git" HEAD:main
